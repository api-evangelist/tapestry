notes: No public rate-limit surface. Limits, if applicable, are inherited from the underlying
  commerce or partner platform and the partnership agreement.
responseCodes:
  throttled: 429
limits:
  - name: Partner-agreement limits
    scope: account
    metric: varies
    limit: see partnership agreement
policies:
